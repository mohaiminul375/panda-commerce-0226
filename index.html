<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
        <link rel="stylesheet" href="style.css">
        <title>Panda Commerce</title>
    </head>
    <body>
        <!-- navbar -->
        <nav>
            <!-- logo -->
            <div>
                <img class="logo" src="assets/logo.png" alt="panda-logo">
            </div>
            <div>
                <img class="hamb-menu" src="assets/menu-bar.png"
                    alt="hamb-menu">
            </div>
        </nav>
        <!-- banner -->
        <section id="banner-container">
            <div>
                <h2>Mi LED TV 4A PRO 32</h2>
                <h6>Amet minim mollit non deserunt ullamco est sit aliqua dolor
                    <br>
                    do amet sint. Velit officia consequat duis enim velit
                    mollit. <br> Exercitation veniam consequat sunt nostrud
                    amet.</h6>
                <h2 id="banner-price">$1289</h2>
                <button class="btn-primary">Buy Now</button>
            </div>
            <div>
                <img src="assets/hero-tv.png" alt>
            </div>
        </section>
        <!-- category -->
        <section id="category">
            <h1>Category</h1>
            <!-- container -->
            <div class="category-container">
                <div style="background: #FF9C35" class="category">
                    <h5>Watch</h5>
                    <img src="assets/category-watch.png" alt>
                </div>
                <div style="background: #FF136F" class="category">
                    <h5>Bag</h5>
                    <img src="assets/category-bag.png" alt>
                </div>
                <div style="background: #3F07F8" class="category">
                    <h5>Shoes</h5>
                    <img src="assets/category-shoe.png" alt>
                </div>
            </div>
        </section>
        <!-- products card -->
        <section>

        </section>
    </body>
</html>
